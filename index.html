<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hub - Минималистичный интерактивный сайт</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="content-wrapper">
        <header>
            <div class="icon-wrapper">
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
                    <circle cx="50" cy="50" r="35" stroke="white" stroke-width="3" fill="none" opacity="0.5"/>
                    <circle cx="50" cy="50" r="25" fill="white" opacity="0.8"/>
                    <path d="M50 30 L60 50 L50 70 L40 50 Z" fill="rgba(99, 102, 241, 0.8)"/>
                </svg>
            </div>
            <h1>Interactive Hub</h1>
            <p>✨ Минималистичный интерактивный сайт с крутыми эффектами ✨</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="todo">
                <span>📝 Todo List</span>
            </button>
            <button class="tab-btn" data-tab="calculator">
                <span>🔢 Калькулятор</span>
            </button>
            <button class="tab-btn" data-tab="timer">
                <span>⏱️ Таймер</span>
            </button>
            <button class="tab-btn" data-tab="notes">
                <span>📔 Заметки</span>
            </button>
            <button class="tab-btn" data-tab="draw">
                <span>🎨 Рисование</span>
            </button>
            <button class="tab-btn" data-tab="weather">
                <span>🌤️ Погода</span>
            </button>
        </nav>

        <main>
            <!-- Todo List -->
            <section id="todo" class="tab-content active">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="15" width="60" height="70" rx="5" stroke="#6366f1" stroke-width="3" fill="none"/>
                        <path d="M30 35 L45 50 L70 25" stroke="#6366f1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        <line x1="30" y1="60" x2="70" y2="60" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
                        <line x1="30" y1="75" x2="70" y2="75" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2>Todo List</h2>
                <div class="todo-container">
                    <div class="input-group">
                        <input type="text" id="todo-input" placeholder="Добавить новую задачу...">
                        <button id="add-todo">➕ Добавить</button>
                    </div>
                    <ul id="todo-list"></ul>
                </div>
            </section>

            <!-- Calculator -->
            <section id="calculator" class="tab-content">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="15" y="10" width="70" height="80" rx="8" stroke="#6366f1" stroke-width="3" fill="none"/>
                        <rect x="25" y="20" width="50" height="15" rx="3" fill="#6366f1" opacity="0.3"/>
                        <circle cx="32" cy="50" r="6" fill="#6366f1"/>
                        <circle cx="50" cy="50" r="6" fill="#6366f1"/>
                        <circle cx="68" cy="50" r="6" fill="#6366f1"/>
                        <circle cx="32" cy="68" r="6" fill="#6366f1"/>
                        <circle cx="50" cy="68" r="6" fill="#6366f1"/>
                        <circle cx="68" cy="68" r="6" fill="#6366f1"/>
                    </svg>
                </div>
                <h2>Калькулятор</h2>
                <div class="calculator">
                    <div class="calc-display" id="calc-display">0</div>
                    <div class="calc-buttons">
                        <button class="calc-btn" data-value="7">7</button>
                        <button class="calc-btn" data-value="8">8</button>
                        <button class="calc-btn" data-value="9">9</button>
                        <button class="calc-btn operator" data-value="/">÷</button>

                        <button class="calc-btn" data-value="4">4</button>
                        <button class="calc-btn" data-value="5">5</button>
                        <button class="calc-btn" data-value="6">6</button>
                        <button class="calc-btn operator" data-value="*">×</button>

                        <button class="calc-btn" data-value="1">1</button>
                        <button class="calc-btn" data-value="2">2</button>
                        <button class="calc-btn" data-value="3">3</button>
                        <button class="calc-btn operator" data-value="-">−</button>

                        <button class="calc-btn" data-value="0">0</button>
                        <button class="calc-btn" data-value=".">.</button>
                        <button class="calc-btn operator" data-value="=">=</button>
                        <button class="calc-btn operator" data-value="+">+</button>

                        <button class="calc-btn clear" data-value="C">C</button>
                    </div>
                </div>
            </section>

            <!-- Timer -->
            <section id="timer" class="tab-content">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="55" r="35" stroke="#6366f1" stroke-width="3" fill="none"/>
                        <path d="M50 55 L50 30" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
                        <path d="M50 55 L65 65" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
                        <rect x="40" y="10" width="20" height="8" rx="2" fill="#6366f1"/>
                        <line x1="50" y1="18" x2="50" y2="20" stroke="#6366f1" stroke-width="2"/>
                    </svg>
                </div>
                <h2>Таймер</h2>
                <div class="timer-container">
                    <div class="timer-display" id="timer-display">00:00</div>
                    <div class="timer-controls">
                        <input type="number" id="timer-minutes" placeholder="Минуты" min="0" max="99">
                        <input type="number" id="timer-seconds" placeholder="Секунды" min="0" max="59">
                    </div>
                    <div class="timer-buttons">
                        <button id="timer-start">▶️ Старт</button>
                        <button id="timer-pause">⏸️ Пауза</button>
                        <button id="timer-reset">🔄 Сброс</button>
                    </div>
                </div>
            </section>

            <!-- Notes -->
            <section id="notes" class="tab-content">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M25 15 L75 15 L75 75 L65 85 L25 85 Z" stroke="#6366f1" stroke-width="3" fill="none"/>
                        <path d="M65 75 L65 85 L75 75 Z" stroke="#6366f1" stroke-width="3" fill="rgba(99, 102, 241, 0.2)"/>
                        <line x1="35" y1="30" x2="65" y2="30" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                        <line x1="35" y1="45" x2="65" y2="45" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                        <line x1="35" y1="60" x2="55" y2="60" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h2>Заметки</h2>
                <div class="notes-container">
                    <textarea id="notes-area" placeholder="Начните писать свои заметки здесь..."></textarea>
                    <div class="notes-buttons">
                        <button id="save-note">💾 Сохранить</button>
                        <button id="clear-note">🗑️ Очистить</button>
                    </div>
                    <div id="saved-notes"></div>
                </div>
            </section>

            <!-- Drawing Canvas -->
            <section id="draw" class="tab-content">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="15" y="25" width="70" height="60" rx="5" stroke="#6366f1" stroke-width="3" fill="none"/>
                        <path d="M25 75 Q35 65 45 70 T65 65 L75 70" stroke="#ec4899" stroke-width="3" stroke-linecap="round" fill="none"/>
                        <circle cx="35" cy="45" r="5" fill="#6366f1"/>
                        <circle cx="55" cy="50" r="4" fill="#8b5cf6"/>
                        <path d="M70 15 L75 10 L80 15 L75 35 Z" fill="#6366f1"/>
                    </svg>
                </div>
                <h2>Рисование</h2>
                <div class="draw-container">
                    <div class="draw-controls">
                        <input type="color" id="color-picker" value="#6366f1">
                        <input type="range" id="brush-size" min="1" max="30" value="5">
                        <button id="clear-canvas">🗑️ Очистить</button>
                        <button id="save-canvas">💾 Сохранить</button>
                    </div>
                    <canvas id="draw-canvas" width="800" height="500"></canvas>
                </div>
            </section>

            <!-- Weather -->
            <section id="weather" class="tab-content">
                <div class="icon-wrapper">
                    <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="40" cy="35" r="15" fill="#f59e0b"/>
                        <path d="M40 15 L40 20 M40 50 L40 55 M20 35 L25 35 M55 35 L60 35 M27 22 L30 25 M50 25 L53 22 M27 48 L30 45 M50 45 L53 48" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
                        <path d="M55 50 Q60 45 65 50 Q70 45 75 50 Q70 55 65 50 Q60 55 55 50 Z" fill="#6366f1" opacity="0.6"/>
                        <path d="M45 60 Q50 55 55 60 Q60 55 65 60 Q60 65 55 60 Q50 65 45 60 Z" fill="#8b5cf6" opacity="0.6"/>
                        <path d="M35 70 Q40 65 45 70 Q50 65 55 70 Q50 75 45 70 Q40 75 35 70 Z" fill="#ec4899" opacity="0.6"/>
                    </svg>
                </div>
                <h2>Погода</h2>
                <div class="weather-container">
                    <div class="input-group">
                        <input type="text" id="city-input" placeholder="Введите название города...">
                        <button id="get-weather">🔍 Поиск</button>
                    </div>
                    <div id="weather-display"></div>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 Interactive Hub | Создано с ❤️ и множеством эффектов</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
